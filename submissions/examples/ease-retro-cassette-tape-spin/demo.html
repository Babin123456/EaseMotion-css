<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Retro Cassette Tape Spin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="cassette">
            <div class="cassette-label">
                <div class="label-text">MIX TAPE VOL. 1</div>
                <div class="label-gradient"></div>
            </div>
            <div class="cassette-window">
                <div class="tape-spool left">
                    <div class="spool-center"></div>
                    <div class="spool-spokes"></div>
                </div>
                <div class="tape-spool right">
                    <div class="spool-center"></div>
                    <div class="spool-spokes"></div>
                </div>
            </div>
            <div class="cassette-screws top-left"></div>
            <div class="cassette-screws top-right"></div>
            <div class="cassette-screws bottom-left"></div>
            <div class="cassette-screws bottom-right"></div>
        </div>
    </div>
</body>
</html>
