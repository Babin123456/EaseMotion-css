<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Timeline - EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="demo-container">
    <h1>Staggered Timeline</h1>
    <div class="timeline">
      <div class="timeline-item" style="--delay: 1">
        <div class="marker"></div>
        <div class="content">Step 1: Setup</div>
      </div>
      <div class="timeline-item" style="--delay: 2">
        <div class="marker"></div>
        <div class="content">Step 2: Build</div>
      </div>
      <div class="timeline-item" style="--delay: 3">
        <div class="marker"></div>
        <div class="content">Step 3: Deploy</div>
      </div>
    </div>
  </div>
</body>
</html>
