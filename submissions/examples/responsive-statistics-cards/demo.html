<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Statistics Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stats-container">

    <div class="stat-card">
        <div class="icon">👥</div>
        <h2>1.2K+</h2>
        <p>Users</p>
    </div>

    <div class="stat-card">
        <div class="icon">📁</div>
        <h2>350+</h2>
        <p>Projects</p>
    </div>

    <div class="stat-card">
        <div class="icon">⭐</div>
        <h2>98%</h2>
        <p>Success Rate</p>
    </div>

    <div class="stat-card">
        <div class="icon">🚀</div>
        <h2>500+</h2>
        <p>Deployments</p>
    </div>

</div>

</body>
</html>
